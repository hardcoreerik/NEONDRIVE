<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- WiFi Scan mockup matching src/main.cpp layout -->
  <rect width="100%" height="100%" fill="#000000"/>
  <!-- Header band -->
  <rect x="0" y="0" width="800" height="36" fill="#071430" />
  <text x="16" y="24" font-family="Segoe UI, Roboto, Arial" font-size="18" fill="#60a5fa">WiFi Scan</text>

  <!-- Selected line -->
  <rect x="0" y="44" width="800" height="18" fill="#000000" />
  <text x="16" y="58" font-family="Segoe UI, Roboto, Arial" font-size="12" fill="#22c55e">Selected: ExampleAP | CH 6 | -40dBm</text>

  <!-- Status & hint -->
  <text x="16" y="78" font-family="Segoe UI, Roboto, Arial" font-size="12" fill="#06b6d4">APs: 4</text>
  <text x="16" y="94" font-family="Segoe UI, Roboto, Arial" font-size="12" fill="#94a3b8">Tap row to select target</text>

  <!-- AP list box -->
  <g transform="translate(16,110)">
    <rect width="520" height="300" rx="4" fill="#071226" stroke="#1f2a37"/>
    <!-- Rows (4 visible) -->
    <g font-family="Segoe UI, Roboto, Arial" font-size="14" fill="#cbd5e1">
      <rect x="8" y="12" width="504" height="44" rx="4" fill="#081226" stroke="#2b3646" />
      <text x="20" y="40">ExampleAP             00:11:22:33:44:55    -40dBm</text>

      <rect x="8" y="64" width="504" height="44" rx="4" fill="#071226" stroke="#1f2937" />
      <text x="20" y="92">AnotherNet           11:22:33:44:55:66    -72dBm</text>

      <rect x="8" y="116" width="504" height="44" rx="4" fill="#071226" stroke="#1f2937" />
      <text x="20" y="144">HiddenSSID           (hidden)               -90dBm</text>

      <rect x="8" y="168" width="504" height="44" rx="4" fill="#071226" stroke="#1f2937" />
      <text x="20" y="196">CoffeeShopWiFi       AA:BB:CC:DD:EE:FF    -55dBm</text>
    </g>
    <!-- Selected highlight around first row -->
    <rect x="6" y="10" width="508" height="48" rx="6" fill="none" stroke="#16a34a" stroke-width="2" />
  </g>

  <!-- Action dock / buttons on bottom left -->
  <g transform="translate(16,420)">
    <rect x="0" y="0" width="560" height="48" rx="6" fill="#05060a" stroke="#111827" />
    <!-- Buttons: Back, Scan, Stop -->
    <g>
      <rect x="8" y="8" width="120" height="32" rx="6" fill="#0b1f3a" stroke="#0f1724" />
      <text x="56" y="30" font-family="Segoe UI, Roboto" font-size="14" fill="#ffffff" text-anchor="middle">Back</text>

      <rect x="140" y="8" width="120" height="32" rx="6" fill="#0b3a3a" stroke="#0f1724" />
      <text x="200" y="30" font-family="Segoe UI, Roboto" font-size="14" fill="#ffffff" text-anchor="middle">Scan</text>

      <rect x="272" y="8" width="120" height="32" rx="6" fill="#3b0f0f" stroke="#0f1724" />
      <text x="332" y="30" font-family="Segoe UI, Roboto" font-size="14" fill="#ffffff" text-anchor="middle">Stop</text>
    </g>
  </g>
</svg>
