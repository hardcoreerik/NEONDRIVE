name: Build

on:
  push:
    branches: [ main, develop, personality_disorder_innit ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          pio run -e firmware_cyd_2_4
          pio run -e firmware_cyd_3_5
          pio run -e firmware_t_display_s3
          pio run -e firmware_t_embed_cc1101

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bins
          path: |
            .pio/build/firmware_cyd_2_4/firmware.bin
            .pio/build/firmware_cyd_3_5/firmware.bin
            .pio/build/firmware_t_display_s3/firmware.bin
            .pio/build/firmware_t_embed_cc1101/firmware.bin
          retention-days: 30
