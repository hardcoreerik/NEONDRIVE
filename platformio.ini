; Source: Project configuration
[env:cyd]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv

; ⚠️ CRITICAL: CYD has exactly 4MB flash (not 8MB or 16MB)
; partitions.csv is sized for 4MB with two 1.875MB OTA slots.
; DO NOT use huge_app.csv or other larger partition tables —
; bootloader will panic trying to access non-existent flash addresses.
; If you change partitions, recalculate offsets to keep total ≤ 0x400000 bytes.

; LittleFS support (for /config.json)
board_build.filesystem = littlefs

; Libraries (locked per project requirements)
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  PaulStoffregen/XPT2046_Touchscreen
  bblanchon/ArduinoJson @ ^7.0.4

; Touch CS (locked baseline)
build_flags =
  -DTOUCH_CS=33
  ; Explicit feature/debug toggles (release defaults preserve behavior)
  -DUI_DEBUG=0
  -DUI_DEBUG_MEM=0
  -DMEM_BUDGET_MIN_FREE_HEAP=40960
  -DFEATURE_ANDROID_OFFLOAD=1
  ; Force TFT_eSPI to use our local setup file (include/User_Setup.h)
  -DUSER_SETUP_LOADED=1
  -include include/User_Setup.h
  ; DRAM optimization: Reduced loop stack (saves 6KB)
  -DARDUINO_LOOP_STACK_SIZE=10240
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=10240
  ; WSL Bypasser: allows overriding ieee80211_raw_frame_sanity_check()
  ; in libnet80211.a so deauth/disassoc frame injection works reliably.
  -Wl,-zmuldefs
  ; DRAM optimization flags
  -DBOARD_HAS_PSRAM=0
  -DCORE_DEBUG_LEVEL=0
  -Os
  -fdata-sections
  -ffunction-sections
  -Wl,--gc-sections

[env:lilygo_t_display_s3]
extends = env:cyd
board = lilygo-t-display-s3
board_build.partitions = default_16MB.csv
upload_port = COM3
upload_speed = 460800
monitor_port = COM3
build_unflags =
  -DTOUCH_CS=33
  -include include/User_Setup.h
  -DBOARD_HAS_PSRAM=0
  -DARDUINO_LOOP_STACK_SIZE=10240
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=10240
build_flags =
  ${env:cyd.build_flags}
  -DNEONDRIVE_TARGET_TDISPLAY_S3=1
  -DBOARD_HAS_PSRAM=1
  -include include/User_Setup_tdisplay_s3.h

[env:cyd_debug_mem]
extends = env:cyd
build_type = release
build_unflags =
  -DUI_DEBUG=0
  -DUI_DEBUG_MEM=0
build_flags =
  ${env:cyd.build_flags}
  -DUI_DEBUG=1
  -DUI_DEBUG_MEM=1

; ---------- Upload ----------
upload_port = COM10
upload_speed = 921600

[env:firmware_cyd_2_4]
extends = env:cyd

[env:firmware_t_display_s3]
extends = env:lilygo_t_display_s3

