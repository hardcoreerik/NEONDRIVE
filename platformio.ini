; ---------- M5Stack Tab5 (ESP32-P4 + ESP32-C6 WiFi 6) ----------
; Dual-chip: ESP32-P4 handles compute/display (MIPI-DSI 5"), ESP32-C6 handles WiFi 6 + BT5.
; TFT_eSPI is NOT used here — display is MIPI-DSI, managed by M5GFX auto-detection.
; Raw frame injection (WSL bypasser, bruce_wifi) is disabled — ESP32-P4 delegates WiFi
; to the C6 co-processor and does not expose ieee80211_raw_frame_sanity_check or
; esp_wifi_80211_tx in the same libnet80211 path used by classic ESP32.
; Requires: pioarduino platform with Arduino-ESP32 P4 support (ESP-IDF 5.4+).
; Flash entry: hold RESET ~2 s until internal green LED blinks rapidly, then release.

[env:m5tab5_base]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.20
framework = arduino
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
upload_speed = 1500000
monitor_speed = 115200
; Exclude files that use esp_wifi_80211_tx / ieee80211_raw_frame_sanity_check —
; those symbols require the WiFi driver to be on the same chip (classic ESP32/S3).
; On Tab5, WiFi is delegated to the C6 co-processor. Inline no-ops in the
; corresponding headers keep call sites in main.cpp compiling unchanged.
build_src_filter = +<*> -<wsl_bypasser.cpp> -<bruce_wifi.cpp>
lib_deps =
  m5stack/M5Unified @ ^0.2.0
  m5stack/M5GFX @ ^0.2.4
  bblanchon/ArduinoJson @ ^7.0.4
build_flags =
  -DNEONDRIVE_TARGET_M5TAB5=1
  -DARDUINO_M5STACK_TAB5=1
  -DBOARD_HAS_PSRAM=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=0
  -DUI_DEBUG=0
  -DUI_DEBUG_MEM=0
  -DMEM_BUDGET_MIN_FREE_HEAP=40960
  -DFEATURE_ANDROID_OFFLOAD=1

[env:firmware_m5tab5]
extends = env:m5tab5_base
upload_port = COM17
monitor_port = COM17
