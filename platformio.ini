; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:cyd]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
platform_packages =
	platformio/tool-esptoolpy@~1.40501.0
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
lib_deps = 
	bodmer/TFT_eSPI @ ^2.5.43
	PaulStoffregen/XPT2046_Touchscreen
	bblanchon/ArduinoJson @ ^7.0.4
build_flags = 
	-DTOUCH_CS=33
	-DUI_DEBUG=0
	-DUI_DEBUG_MEM=0
	-DMEM_BUDGET_MIN_FREE_HEAP=40960
	-DFEATURE_ANDROID_OFFLOAD=1
	-DNEONDRIVE_TARGET_CYD=1
	-DUSER_SETUP_LOADED=1
	-include include/User_Setup.h
	-DARDUINO_LOOP_STACK_SIZE=10240
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=10240
	-Wl,-zmuldefs
	-DBOARD_HAS_PSRAM=0
	-DCORE_DEBUG_LEVEL=0
	-Os
	-fdata-sections
	-ffunction-sections
	-Wl,--gc-sections

[env:lilygo_t_display_s3]
extends = env:cyd
board = lilygo-t-display-s3
board_build.partitions = default_16MB.csv
upload_speed = 460800
build_unflags = 
	-DTOUCH_CS=33
	-include include/User_Setup.h
	-DBOARD_HAS_PSRAM=0
	-DARDUINO_LOOP_STACK_SIZE=10240
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=10240
	-DNEONDRIVE_TARGET_CYD=1
build_flags = 
	${env:cyd.build_flags}
	-DNEONDRIVE_TARGET_TDISPLAY_S3=1
	-DBOARD_HAS_PSRAM=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MSC_ON_BOOT=0
	-DCONFIG_TINYUSB_MSC_ENABLED=1
	-DARDUINO_USB_MODE=0
	-include include/User_Setup_tdisplay_s3.h

[env:lilygo_t_embed_cc1101]
extends = env:cyd
board = lilygo-t-display-s3
board_build.partitions = default_16MB.csv
upload_speed = 460800
build_unflags = 
	-DTOUCH_CS=33
	-include include/User_Setup.h
	-DBOARD_HAS_PSRAM=0
	-DARDUINO_LOOP_STACK_SIZE=10240
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=10240
	-DNEONDRIVE_TARGET_CYD=1
build_flags = 
	${env:cyd.build_flags}
	-DNEONDRIVE_TARGET_T_EMBED_CC1101=1
	-DBOARD_HAS_PSRAM=1
	-include include/User_Setup_tembed_cc1101.h

[env:cyd_debug_mem]
extends = env:cyd
build_type = release
build_unflags = 
	-DUI_DEBUG=0
	-DUI_DEBUG_MEM=0
build_flags = 
	${env:cyd.build_flags}
	-DUI_DEBUG=1
	-DUI_DEBUG_MEM=1
upload_speed = 921600

[env:firmware_cyd_2_4]
extends = env:cyd
build_flags =
	${env:cyd.build_flags}
	-DNEONDRIVE_TARGET_CYD24=1

[env:firmware_cyd_2_8]
extends = env:cyd
lib_deps = 
	${env:cyd.lib_deps}
	nitek/XPT2046_Bitbang_Slim@^2.0.0
build_flags = 
	${env:cyd.build_flags}
	-DNEONDRIVE_TARGET_CYD28=1

[env:firmware_cyd_3_5]
extends = env:cyd
upload_speed = 460800
build_unflags = 
	-include include/User_Setup.h
	-DNEONDRIVE_TARGET_CYD=1
build_flags = 
	${env:cyd.build_flags}
	-DNEONDRIVE_TARGET_CYD35=1
	-DND_TOUCH_TEST_SCREEN=0
	-DND_TOUCH_CAL_WIZARD=1
	-DND_TOUCH_CAL_ALWAYS=0
	-DND_TOUCH_VISUAL_DEBUG=0
	-include include/User_Setup_cyd35.h

[env:firmware_t_display_s3]
extends = env:lilygo_t_display_s3

[env:firmware_t_display_s3_touch]
extends = env:lilygo_t_display_s3
build_flags =
	${env:lilygo_t_display_s3.build_flags}
	-DNEONDRIVE_TARGET_TDISPLAY_S3_TOUCH=1
	-DNEONDRIVE_TDISPLAY_S3_HAS_TOUCH=1

[env:firmware_t_embed_cc1101]
extends = env:lilygo_t_embed_cc1101

[env:m5tab5_base]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
framework = arduino
platform_packages =
	framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/releases/download/3.3.8/esp32-core-3.3.8.tar.xz
	platformio/toolchain-riscv32-esp@~14.2.0
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
upload_speed = 1500000
monitor_speed = 115200
extra_scripts = pre:tools/patch_m5gfx.py
build_src_filter = +<*> -<wsl_bypasser.cpp> -<bruce_wifi.cpp> -<hypercube_widget.cpp>
lib_deps = 
	m5stack/M5Unified @ ^0.2.4
	m5stack/M5GFX @ ^0.2.6
	bblanchon/ArduinoJson @ ^7.0.4
build_flags = 
	-DNEONDRIVE_TARGET_M5TAB5=1
	-DARDUINO_M5STACK_TAB5=1
	-include include/tab5_sdkconfig_override.h
	-DBOARD_HAS_PSRAM=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DCORE_DEBUG_LEVEL=4
	-DUI_DEBUG=0
	-DUI_DEBUG_MEM=0
	-DMEM_BUDGET_MIN_FREE_HEAP=40960
	-DFEATURE_ANDROID_OFFLOAD=1

[env:firmware_m5tab5]
extends = env:m5tab5_base
platform_packages = platformio/tool-esptoolpy@~2.40900.0

[env:firmware_m5tab5_c6_sdio]
extends = env:firmware_m5tab5
build_flags = 
	${env:m5tab5_base.build_flags}
	-DTAB5_TEST_C6_SDIO=1

[env:firmware_m5tab5_c6_scan]
extends = env:firmware_m5tab5
build_flags = 
	${env:m5tab5_base.build_flags}
	-DTAB5_TEST_C6_SDIO=1
	-DTAB5_TEST_C6_SCAN=1

[env:firmware_m5tab5_wifi_direct]
extends = env:m5tab5_base
build_src_filter = +<tab5_wifi_direct_test.cpp>
build_flags =
	${env:m5tab5_base.build_flags}
	-DTAB5_WIFI_DIRECT_TEST=1

; ── M5Stack Cardputer Advanced ───────────────────────────────────────────────
; ESP32-S3FN8 (8 MB flash, no PSRAM), 240×135 ST7789, 56-key keyboard
; Flash: $env:PYTHONUTF8=1; pio run -e firmware_cardputer_adv -t upload --upload-port COMx
; (Cardputer Adv auto-resets via DTR — no hold-RESET required)

[env:cardputer_adv_base]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs
upload_speed = 1500000
monitor_speed = 115200
extra_scripts =
build_src_filter = +<*> -<wsl_bypasser.cpp> -<bruce_wifi.cpp> -<hypercube_widget.cpp> -<tab5_wifi_direct_test.cpp>
lib_deps =
	m5stack/M5Cardputer @ ^1.1.1
	bblanchon/ArduinoJson @ ^7.0.4
	bitbank2/PNGenc @ ^1.4.0
build_flags =
	-DNEONDRIVE_TARGET_M5CARDPUTER=1
	-DBOARD_HAS_PSRAM=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DCORE_DEBUG_LEVEL=0
	-DUI_DEBUG=0
	-DUI_DEBUG_MEM=0
	-DMEM_BUDGET_MIN_FREE_HEAP=40960
	-DFEATURE_ANDROID_OFFLOAD=0

[env:firmware_cardputer_adv]
extends = env:cardputer_adv_base
